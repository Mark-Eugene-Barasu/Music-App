<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f12;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#071009;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22e065;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1DB954;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8f0c6;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines for depth -->
  <line x1="0" y1="512" x2="1024" y2="512" stroke="#1DB954" stroke-width="1" opacity="0.06"/>
  <line x1="512" y1="0" x2="512" y2="1024" stroke="#1DB954" stroke-width="1" opacity="0.06"/>

  <!-- Outer glow ring -->
  <circle cx="512" cy="480" r="340" fill="none" stroke="#1DB954" stroke-width="3" opacity="0.12"/>

  <!-- ===== EQUALIZER BARS (background decoration) ===== -->
  <g opacity="0.25">
    <rect x="130" y="560" width="32" height="100" rx="16" fill="#1DB954"/>
    <rect x="178" y="490" width="32" height="170" rx="16" fill="#1DB954"/>
    <rect x="226" y="530" width="32" height="130" rx="16" fill="#1DB954"/>
    <rect x="766" y="560" width="32" height="100" rx="16" fill="#1DB954"/>
    <rect x="814" y="490" width="32" height="170" rx="16" fill="#1DB954"/>
    <rect x="862" y="530" width="32" height="130" rx="16" fill="#1DB954"/>
  </g>

  <!-- ===== BOLD "G" MARK ===== -->
  <g filter="url(#glow)">
    <!-- G arc: thick stroke circle, open on the right -->
    <circle
      cx="512"
      cy="470"
      r="240"
      fill="none"
      stroke="url(#gGrad)"
      stroke-width="88"
      stroke-linecap="round"
      stroke-dasharray="1100 1508"
      stroke-dashoffset="-185"
      transform="rotate(-95 512 470)"
    />
    <!-- Crossbar -->
    <rect x="512" y="432" width="248" height="76" rx="38" fill="url(#gGrad)"/>
    <!-- Vertical stem (right side of crossbar going down) -->
    <rect x="680" y="432" width="80" height="172" rx="38" fill="url(#gGrad)"/>
  </g>

  <!-- ===== MUSIC NOTE (top right, floating) ===== -->
  <g transform="translate(730, 175)" filter="url(#softGlow)">
    <!-- Note head -->
    <ellipse cx="4" cy="62" rx="30" ry="22" fill="url(#noteGrad)" transform="rotate(-18 4 62)"/>
    <!-- Stem -->
    <rect x="28" y="-28" width="11" height="92" rx="5.5" fill="url(#noteGrad)"/>
    <!-- Flag -->
    <path d="M39 -28 Q95 0 72 46" stroke="url(#noteGrad)" stroke-width="11" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ===== "GM" subtle monogram at bottom ===== -->
  <text
    x="512"
    y="840"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="900"
    fill="#1DB954"
    text-anchor="middle"
    letter-spacing="14"
    opacity="0.55"
  >GO-MUSIC</text>
</svg>
